<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Description" content="Transform: Rotate">
    <title>Transform: Rotate</title>
    <style>
        img {
            height: 100px;
            width: 100px;
            transform: rotate(90deg);
        }

        div {
            height: 250px;
            width: 250px;
            background: green;
            transform: rotateX(90deg);
        }

        p {
            font-size: 40px;
            color: white;
        }
    </style>
</head>

<body>
    <img src="./image-one.jpg" alt="image-one">
    <div>
        <p>Hello</p>
    </div>
</body>

</html>
