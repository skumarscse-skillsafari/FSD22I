<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Description" content="CSS - Transform">
    <title>CSS - Transform</title>
    <style>
        /* 
            Transform
            1. Translate - move the element towards X or Y axis
            2. Scale
            3. Rotate
            4. Skew
        */
        div {
            width: 150px;
            height: 150px;
            display: inline-block;
        }

        .one {
            background: red;
            transform: translateX(50%);
        }

        .two {
            background: green;
            transform: translateY(-40px);
        }

        .three {
            background: blue;
            transform: translate(50%, -20%);
        }
    </style>
</head>

<body>
    <div class="one"></div>
    <div class="two"></div>
    <div class="three"></div>
</body>

</html>
